version: '3.8'

services:
  bot:
    build: .
    container_name: erc8004-feedback-bot-sepolia
    restart: "no"
    env_file:
      - .env
    environment:
      - CHAIN=sepolia
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: ["node", "dist/src/index.js"]

# One-shot execution:
#   docker compose -f docker-compose.sepolia.yml run --rm bot
