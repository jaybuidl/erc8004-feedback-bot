version: '3.8'

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erc8004-feedback-bot
    restart: "no"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - CHAIN=${CHAIN:-}
      - CHAINS=${CHAINS:-}
    volumes:
      - ./data:/app/data:rw
      - ./logs:/app/logs:rw
    command: ["node", "dist/src/index.js"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# One-shot execution only:
#   docker compose -f docker-compose.prod.yml run --rm bot
